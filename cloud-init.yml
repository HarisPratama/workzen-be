#cloud-config
packages:
  - curl
  - git
  - nginx
  - certbot
  - python3-certbot-nginx
  - openssl

runcmd:
  # Install Docker
  - curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
  - bash /tmp/get-docker.sh
  - usermod -aG docker root

  # Install Docker Compose
  - curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
  - chmod +x /usr/local/bin/docker-compose

  # Create workzen directory
  - mkdir -p /workzen
  - cd /workzen

  # Generate passwords
  - DB_PASSWORD=$(openssl rand -base64 32)
  - JWT_SECRET=$(openssl rand -base64 32)
  - echo $DB_PASSWORD > /workzen/.db_password.txt
  - chmod 600 /workzen/.db_password.txt

  # Create .env file
  - |
    cat > /workzen/.env << 'EOF'
    APP_ENV="production"
    APP_PORT="8080"
    
    DATABASE_PORT=5432
    DATABASE_HOST=db
    DATABASE_USER=postgres
    DATABASE_PASSWORD=$(cat /workzen/.db_password.txt)
    DATABASE_NAME=workzen_db
    DATABASE_MAX_OPEN_CONNECTION=50
    DATABASE_MAX_IDLE_CONNECTION=20
    
    JWT_SECRET_KEY=$(openssl rand -base64 32)
    JWT_ISSUER=workzen
    
    CLOUDFLARE_R2_BUCKET_NAME=bwanews
    CLOUDFLARE_R2_API_KEY=a7520e26f4cf8554bd5237b8627ded97
    CLOUDFLARE_R2_API_SECRET=a7b1406f80eefdf77e9b98a55a662d41c476a7629049a214ede7b1a90a946072
    CLOUDFLARE_R2_TOKEN=PRq4tKxGnBjZSH7ULLMqJloo5UpCAsohQqPRc7n9
    CLOUDFLARE_R2_ACCOUNT_ID=6cc13fc29c6acbd70f369d5972641267
    CLOUDFLARE_R2_PUBLIC_URL=https://pub-10cde7661f3748d78700e8d9d73fdbea.r2.dev
    EOF
  - chmod 600 /workzen/.env

  # Clone workzen repo
  - cd /workzen && git clone https://github.com/HarisPratama/workzen-be.git .

  # Setup Nginx
  - |
    cat > /etc/nginx/sites-available/api.workzen.web.id << 'NGINX_EOF'
    server {
        listen 80;
        server_name api.workzen.web.id;
    
        location / {
            proxy_pass http://localhost:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
    NGINX_EOF

  - ln -sf /etc/nginx/sites-available/api.workzen.web.id /etc/nginx/sites-enabled/
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t
  - systemctl start nginx
  - systemctl enable nginx

  # Setup SSL
  - certbot --nginx -d api.workzen.web.id --non-interactive --agree-tos -m admin@workzen.web.id --redirect

  # Display completion
  - echo "✅ VPS Setup Complete!"
  - echo "Docker: $(docker --version)"
  - echo "Docker Compose: $(docker-compose --version)"
  - echo "DB Password saved to: /workzen/.db_password.txt"

final_message: "Workzen VPS setup completed! Ready for docker-compose deployment."
