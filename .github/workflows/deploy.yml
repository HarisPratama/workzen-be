name: Deploy to VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: harispratama/workzen-be

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "=== Starting Deployment ==="
            
            cd ~/workzen-be-deploy
            
            # Login to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u harispratama --password-stdin
            
            # Update environment file
            echo "${{ secrets.ENV_FILE }}" > .env
            chmod 600 .env
            
            # Pull latest image
            echo "=== Pulling latest image ==="
            docker pull ghcr.io/harispratama/workzen-be:latest
            
            # Restart only the app container (keep DB running)
            echo "=== Restarting app container ==="
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate app
            
            # Cleanup old images
            echo "=== Cleaning up ==="
            docker image prune -f --filter "until=24h"
            
            # Show status
            echo "=== Deployment Status ==="
            docker compose -f docker-compose.prod.yml ps
            
            echo "=== Deployment Complete ==="

  notify:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v1.0.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 Workzen Backend Deploy Status

            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            
            Message:
            ${{ github.event.head_commit.message }}
            
            Status: ${{ job.status }}
