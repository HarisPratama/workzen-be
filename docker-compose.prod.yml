version: "3.8"

services:

  db:
    image: postgres:15-alpine
    container_name: workzen-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_database
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - workzen-network

  migrate:
    image: ghcr.io/harispratama/workzen-be:latest
    command: migrate -path /migrations -database $DATABASE_URL up
    depends_on:
      - db
    volumes:
      - ./database/migrations:/migrations
    networks:
      - workzen-network

  app:
    image: ghcr.io/harispratama/workzen-be:latest
    container_name: workzen-be
    restart: always
    depends_on:
      - db
      - migrate
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    networks:
      - workzen-network

  nginx:
    image: nginx:alpine
    container_name: workzen-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - workzen-network

volumes:
  pgdata:

networks:
  workzen-network:
