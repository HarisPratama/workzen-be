services:

  db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    container_name: workzen-db
    restart: always
    env_file:
      - .env.db
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - workzen-network

  migrate:
    image: ghcr.io/harispratama/workzen-be:${BE_IMAGE_TAG:-latest}
    env_file:
      - .env
    command: [
      "/app/migrate",
      "-path", "/app/database/migrations",
      "-database", "postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?sslmode=disable",
      "up"
    ]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - workzen-network

  ai:
    image: ghcr.io/harispratama/workzen-ai:${AI_IMAGE_TAG:-latest}
    container_name: workzen-ai
    restart: always
    expose:
      - "50051"
    env_file:
      - .env.ai
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch = grpc.insecure_channel('localhost:50051'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - workzen-network

  app:
    image: ghcr.io/harispratama/workzen-be:${BE_IMAGE_TAG:-latest}
    container_name: workzen-be
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ai:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      AI_SERVICE_ADDR: ai:50051
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/auth/login", "||", "true"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - workzen-network

  nginx:
    image: nginx:alpine
    container_name: workzen-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      app:
        condition: service_healthy
    networks:
      - workzen-network

volumes:
  pgdata:

networks:
  workzen-network:
    driver: bridge
