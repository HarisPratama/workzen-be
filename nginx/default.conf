# Nginx configuration untuk Workzen API
# Menggunakan variable untuk dynamic DNS resolution

server {
    listen 80;
    server_name api.workzen.web.id www.api.workzen.web.id;

    # Redirect semua HTTP ke HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.workzen.web.id www.api.workzen.web.id;

    ssl_certificate /etc/letsencrypt/live/api.workzen.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.workzen.web.id/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Proxy ke workzen-be container
    # Menggunakan Docker internal DNS dengan variable untuk lazy resolution
    location / {
        # Resolver Docker internal
        resolver 127.0.0.11 valid=30s;
        
        # Variable untuk proxy_pass - memaksa lazy evaluation
        set $backend_host "workzen-be";
        set $backend_port "8080";
        set $backend_url "http://$backend_host:$backend_port";
        
        proxy_pass $backend_url;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
